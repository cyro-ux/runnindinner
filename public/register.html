<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account aanmaken – Running Dinner Planner</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/home.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <style>
    .steps-indicator {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 28px;
    }
    .step-dot {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .step-dot-circle {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: .78rem; font-weight: 700;
    }
    .step-dot-circle.active { background: #1a56db; color: #fff; }
    .step-dot-circle.pending { background: #e5e7eb; color: #9ca3af; }
    .step-dot-label { font-size: .7rem; color: #6b7280; white-space: nowrap; }
    .step-dot-label.active { color: #1a56db; font-weight: 600; }
    .step-connector { width: 40px; height: 2px; background: #e5e7eb; margin: 0 4px; margin-bottom: 18px; }
    .payment-info-box {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
      padding: 10px 14px; font-size: .82rem; color: #92400e; margin-bottom: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div style="position:fixed;top:12px;right:16px;z-index:1000" id="auth-lang-toggle"></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🍽️</div>
    <h1 class="auth-title" data-i18n="auth.register.title">Account aanmaken</h1>
    <p class="auth-subtitle" data-i18n="auth.register.subtitle">Stap 1 van 2 — aanmelden, daarna betalen</p>

    <!-- Stappen indicator -->
    <div class="steps-indicator">
      <div class="step-dot">
        <div class="step-dot-circle active">1</div>
        <span class="step-dot-label active" data-i18n="auth.register.step_account">Account</span>
      </div>
      <div class="step-connector"></div>
      <div class="step-dot">
        <div class="step-dot-circle pending">2</div>
        <span class="step-dot-label" data-i18n="auth.register.step_payment">Betalen</span>
      </div>
    </div>

    <div class="payment-info-box" data-i18n-html="auth.register.payment_info">
      💳 Na het aanmaken word je direct doorgestuurd naar de betaalpagina. Toegang kost <strong>€5 per jaar</strong>.
    </div>

    <div class="auth-error"   id="error-msg"></div>
    <div class="auth-success" id="success-msg"></div>

    <form class="auth-form" id="register-form">
      <div class="form-group">
        <label for="email" data-i18n="auth.register.email_label">E-mailadres</label>
        <input type="email" id="email" autocomplete="email" placeholder="jouw@email.nl" data-i18n-placeholder="auth.register.email_placeholder" required>
      </div>
      <div class="form-group">
        <label for="password" data-i18n-html="auth.register.password_label">Wachtwoord <span style="font-weight:400;color:#6b7280">(min. 8 tekens)</span></label>
        <input type="password" id="password" autocomplete="new-password" placeholder="••••••••" required minlength="8">
      </div>
      <div class="form-group">
        <label for="password2" data-i18n="auth.register.password2_label">Wachtwoord herhalen</label>
        <input type="password" id="password2" autocomplete="new-password" placeholder="••••••••" required minlength="8">
      </div>
      <button type="submit" class="btn-primary" id="submit-btn" data-i18n="auth.register.submit">Account aanmaken → naar betalen</button>
    </form>

    <!-- Betaalmethoden -->
    <div style="margin-top:16px;text-align:center">
      <p style="font-size:.75rem;color:#9ca3af;margin-bottom:8px" data-i18n="auth.register.payment_methods_label">Betaalmethoden</p>
      <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
        <span style="background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;font-size:.74rem;font-weight:600;color:#374151">🇳🇱 iDEAL</span>
        <span style="background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;font-size:.74rem;font-weight:600;color:#374151">🇧🇪 Bancontact</span>
        <span style="background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;font-size:.74rem;font-weight:600;color:#374151">PayPal</span>
        <span style="background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;font-size:.74rem;font-weight:600;color:#374151">Creditcard</span>
        <span style="background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;font-size:.74rem;font-weight:600;color:#374151">SEPA</span>
      </div>
    </div>

    <div class="auth-links">
      <span data-i18n="auth.register.have_account">Al een account?</span> <a href="/login.html" data-i18n="auth.register.login_link">Inloggen</a>
    </div>
  </div>
</div>
<script defer data-domain="runningdiner.nl" data-api="/api/event" src="/js/script.js"></script>
<script src="/lang/i18n.js"></script>
<script>
  I18n.onReady(() => {
    const c = document.getElementById('auth-lang-toggle');
    if (c) c.appendChild(I18n.createToggle());
  });

  // Capture referral code from URL if present (persist in sessionStorage in case
  // user navigates away and back)
  const urlParams = new URLSearchParams(window.location.search);
  const urlRef = urlParams.get('ref');
  if (urlRef) {
    sessionStorage.setItem('rd_ref', urlRef);
    // Show a subtle "invited by a friend" banner
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:.85rem;color:#166534;margin-bottom:16px;text-align:center';
    banner.innerHTML = '🎉 ' + I18n.t('auth.register.invited', 'Je bent uitgenodigd door een vriend!');
    const form = document.getElementById('register-form');
    form.parentElement.insertBefore(banner, form);
  }

  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn    = document.getElementById('submit-btn');
    const errEl  = document.getElementById('error-msg');
    const succEl = document.getElementById('success-msg');
    errEl.style.display = succEl.style.display = 'none';

    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    if (password !== password2) {
      errEl.textContent = I18n.t('auth.register.error_mismatch', 'Wachtwoorden komen niet overeen');
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = I18n.t('auth.register.creating', 'Account aanmaken…');

    try {
      const refCode = sessionStorage.getItem('rd_ref') || urlRef || null;
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password,
          referralCode: refCode,
        }),
      });
      const data = await res.json();

      if (res.ok) {
        // Auto-login immediately, then start Mollie payment
        const loginRes = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value, password }),
        });
        if (loginRes.ok) {
          // Directly start checkout
          btn.textContent = I18n.t('auth.register.redirecting_payment', 'Doorsturen naar betaalpagina…');
          const checkoutRes = await fetch('/api/mollie/create-payment', { method: 'POST' });
          const checkoutData = await checkoutRes.json();
          if (checkoutRes.ok && checkoutData.url) {
            window.location.href = checkoutData.url;
            return;
          }
        }
        // Fallback: redirect to subscribe page
        succEl.textContent = I18n.t('auth.register.success_redirect', 'Account aangemaakt! Doorsturen naar betaalpagina…');
        succEl.style.display = 'block';
        if (window.plausible) plausible('Signup');
        setTimeout(() => { window.location.href = '/subscribe.html'; }, 1000);
      } else {
        errEl.textContent = data.error || I18n.t('auth.register.error_failed', 'Registreren mislukt');
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = I18n.t('auth.register.submit', 'Account aanmaken → naar betalen');
      }
    } catch {
      errEl.textContent = I18n.t('auth.register.error_network', 'Netwerkfout. Probeer het opnieuw.');
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = I18n.t('auth.register.submit', 'Account aanmaken → naar betalen');
    }
  });
</script>
</body>
</html>
