<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betaling geslaagd – Running Dinner Planner</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/home.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <style>
    .success-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #FFFBF7; padding: 24px; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .success-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 460px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.1); }
    .success-icon { font-size: 4rem; margin-bottom: 16px; }
    .success-title { font-size: 1.8rem; font-weight: 800; color: #10B981; margin-bottom: 10px; letter-spacing: -.02em; }
    .success-msg { color: #64748B; margin-bottom: 28px; line-height: 1.7; }
    .success-info { background: #F0FDF4; border: 1px solid rgba(16,185,129,.2); border-radius: 12px; padding: 18px; margin-bottom: 28px; font-size: .88rem; color: #166534; text-align: left; }
    .success-info p { margin-bottom: 6px; }
    .success-info p:last-child { margin: 0; }
    .btn-app { display: block; background: #E85D3A; color: #fff; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 700; text-decoration: none; margin-bottom: 12px; transition: all .2s; box-shadow: 0 4px 16px rgba(232,93,58,.25); }
    .btn-app:hover { background: #D14A28; text-decoration: none; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,93,58,.35); }
    .success-note { font-size: .8rem; color: #94A3B8; }
    .loading { color: #64748B; font-size: .9rem; }
  </style>
</head>
<body>
<div style="position:fixed;top:12px;right:16px;z-index:1000" id="auth-lang-toggle"></div>
<div class="success-page">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <h1 class="success-title" data-i18n="auth.payment_success.title">Betaling geslaagd!</h1>
    <p class="success-msg" data-i18n="auth.payment_success.message">Bedankt voor je abonnement. Je hebt nu volledige toegang tot de Running Dinner Planner.</p>

    <div class="success-info" id="info-block">
      <p class="loading" data-i18n="auth.payment_success.loading">Abonnementsgegevens laden…</p>
    </div>

    <a href="/app" class="btn-app" data-i18n="auth.payment_success.open_planner">Open de planner →</a>
    <p class="success-note" data-i18n="auth.payment_success.invoice_note">Je ontvangt een factuur per e-mail.</p>
  </div>
</div>
<script src="/lang/i18n.js"></script>
<script>
  I18n.onReady(() => {
    const c = document.getElementById('auth-lang-toggle');
    if (c) c.appendChild(I18n.createToggle());
  });

  // Fetch updated user info to display license date + auto-renew status
  fetch('/api/app/access')
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      const info = document.getElementById('info-block');
      if (data?.license_until) {
        const until = new Date(data.license_until).toLocaleDateString('nl-NL');
        let html = '<p>&#10003; <strong>' + I18n.t('auth.payment_success.subscription_active', 'Abonnement actief') + '</strong></p>';
        html += '<p>' + I18n.t('auth.payment_success.valid_until', 'Geldig tot') + ': <strong>' + until + '</strong></p>';
        if (data.auto_renew) {
          html += '<p>&#10003; <strong>' + I18n.t('auth.payment_success.auto_renew_on', 'Automatische verlenging ingeschakeld') + '</strong></p>';
        }
        info.innerHTML = html;
      } else {
        info.innerHTML = '<p>' + I18n.t('auth.payment_success.processing', 'Abonnement wordt verwerkt. Dit kan een moment duren.') + '</p>';
      }
    })
    .catch(() => {
      document.getElementById('info-block').innerHTML = '<p>' + I18n.t('auth.payment_success.processing_email', 'Abonnement wordt verwerkt. Controleer je e-mail voor de factuur.') + '</p>';
    });
</script>
</body>
</html>
