<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Favicons + PWA manifest -->
  <link rel="icon" type="image/svg+xml" href="/images/runningdinner-logo.svg">
  <link rel="icon" type="image/png" sizes="240x240" href="/images/runningdinner-icon-240.png">
  <link rel="apple-touch-icon" sizes="240x240" href="/images/runningdinner-icon-240.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#E85D3A">
  <title>Inloggen – Running Dinner Planner</title>
  <link rel="alternate" hreflang="nl" href="https://runningdinner.app/login.html">
  <link rel="alternate" hreflang="en" href="https://runningdinner.app/en/login.html">
  <link rel="alternate" hreflang="es" href="https://runningdinner.app/es/login.html">
  <link rel="alternate" hreflang="de" href="https://runningdinner.app/de/login.html">
  <link rel="alternate" hreflang="x-default" href="https://runningdinner.app/login.html">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/home.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
<div style="position:fixed;top:12px;right:16px;z-index:1000" id="auth-lang-toggle"></div>
<div class="auth-page">
  <div class="auth-card">
    <a href="/" class="auth-logo" aria-label="runningdinner.app"><img src="/images/runningdinner-logo-nav.png" alt="runningdinner.app" width="200" height="53" style="max-width:200px;height:auto;display:block;margin:0 auto"></a>
    <h1 class="auth-title" data-i18n="auth.login.title">Inloggen</h1>
    <p class="auth-subtitle" data-i18n="auth.login.subtitle">Welkom terug bij Running Dinner Planner</p>

    <div class="auth-error" id="error-msg"></div>

    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label for="email" data-i18n="auth.login.email_label">E-mailadres</label>
        <input type="email" id="email" autocomplete="email" placeholder="jouw@email.nl" data-i18n-placeholder="auth.login.email_placeholder" required>
      </div>
      <div class="form-group">
        <label for="password" data-i18n="auth.login.password_label">Wachtwoord</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn" data-i18n="auth.login.submit">Inloggen</button>
    </form>

    <div class="auth-links">
      <a href="/forgot-password.html" data-i18n="auth.login.forgot_password">Wachtwoord vergeten?</a><br><br>
      <span data-i18n="auth.login.no_account">Nog geen account?</span> <a href="/register.html" data-i18n="auth.login.register_link">Registreer gratis</a>
    </div>
  </div>
</div>
<script defer data-domain="runningdinner.app" data-api="/api/event" src="/js/script.js"></script>
<script src="/lang/i18n.js?v=de1"></script>
<script>
  I18n.onReady(() => {
    const c = document.getElementById('auth-lang-toggle');
    if (c) c.appendChild(I18n.createToggle());
  });

  // Redirect if already logged in
  fetch('/api/auth/me').then(r => {
    if (r.ok) return r.json();
  }).then(data => {
    if (data?.ok) {
      window.location.href = data.user.role === 'admin' ? '/admin/' : '/app';
    }
  }).catch(() => {});

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = I18n.t('auth.login.logging_in', 'Inloggen...');
    err.style.display = 'none';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();

      if (res.ok) {
        const redirect = new URLSearchParams(location.search).get('next') || '/app';
        window.location.href = data.user?.role === 'admin' ? '/admin/' : redirect;
      } else {
        err.textContent = data.error || I18n.t('auth.login.error_failed', 'Inloggen mislukt');
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = I18n.t('auth.login.submit', 'Inloggen');
      }
    } catch {
      err.textContent = I18n.t('auth.login.error_network', 'Netwerkfout. Probeer het opnieuw.');
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = I18n.t('auth.login.submit', 'Inloggen');
    }
  });
</script>
</body>
</html>
