<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wachtwoord vergeten – Running Dinner Planner</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/home.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
<div style="position:fixed;top:12px;right:16px;z-index:1000" id="auth-lang-toggle"></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🔑</div>
    <h1 class="auth-title" data-i18n="auth.forgot.title">Wachtwoord vergeten?</h1>
    <p class="auth-subtitle" data-i18n="auth.forgot.subtitle">Voer je e-mailadres in. Als het bekend is, sturen we een resetlink.</p>

    <div class="auth-success" id="success-msg"></div>
    <div class="auth-error"   id="error-msg"></div>

    <form class="auth-form" id="forgot-form">
      <div class="form-group">
        <label for="email" data-i18n="auth.forgot.email_label">E-mailadres</label>
        <input type="email" id="email" autocomplete="email" placeholder="jouw@email.nl" data-i18n-placeholder="auth.forgot.email_placeholder" required>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn" data-i18n="auth.forgot.submit">Verstuur resetlink</button>
    </form>

    <div class="auth-links">
      <a href="/login.html" data-i18n="auth.forgot.back_to_login">← Terug naar inloggen</a>
    </div>
  </div>
</div>
<script defer data-domain="runningdinner.app" data-api="/api/event" src="/js/script.js"></script>
<script src="/lang/i18n.js"></script>
<script>
  I18n.onReady(() => {
    const c = document.getElementById('auth-lang-toggle');
    if (c) c.appendChild(I18n.createToggle());
  });

  document.getElementById('forgot-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('submit-btn');
    const succEl = document.getElementById('success-msg');
    const errEl  = document.getElementById('error-msg');
    succEl.style.display = errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = I18n.t('auth.forgot.sending', 'Versturen...');

    try {
      const res  = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value }),
      });
      const data = await res.json();
      succEl.textContent = data.message || I18n.t('auth.forgot.success', 'Als dit adres bekend is, ontvang je een e-mail.');
      succEl.style.display = 'block';
      e.target.reset();
    } catch {
      errEl.textContent = I18n.t('auth.forgot.error_network', 'Netwerkfout. Probeer het opnieuw.');
      errEl.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = I18n.t('auth.forgot.submit', 'Verstuur resetlink');
  });
</script>
</body>
</html>
