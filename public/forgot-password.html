<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wachtwoord vergeten – Running Dinner Planner</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/home.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🔑</div>
    <h1 class="auth-title">Wachtwoord vergeten?</h1>
    <p class="auth-subtitle">Voer je e-mailadres in. Als het bekend is, sturen we een resetlink.</p>

    <div class="auth-success" id="success-msg"></div>
    <div class="auth-error"   id="error-msg"></div>

    <form class="auth-form" id="forgot-form">
      <div class="form-group">
        <label for="email">E-mailadres</label>
        <input type="email" id="email" autocomplete="email" placeholder="jouw@email.nl" required>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Verstuur resetlink</button>
    </form>

    <div class="auth-links">
      <a href="/login.html">← Terug naar inloggen</a>
    </div>
  </div>
</div>
<script>
  document.getElementById('forgot-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('submit-btn');
    const succEl = document.getElementById('success-msg');
    const errEl  = document.getElementById('error-msg');
    succEl.style.display = errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Versturen...';

    try {
      const res  = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value }),
      });
      const data = await res.json();
      succEl.textContent = data.message || 'Als dit adres bekend is, ontvang je een e-mail.';
      succEl.style.display = 'block';
      e.target.reset();
    } catch {
      errEl.textContent = 'Netwerkfout. Probeer het opnieuw.';
      errEl.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Verstuur resetlink';
  });
</script>
</body>
</html>
