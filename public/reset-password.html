<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nieuw wachtwoord instellen – Running Dinner Planner</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/home.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
<div style="position:fixed;top:12px;right:16px;z-index:1000" id="auth-lang-toggle"></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🔒</div>
    <h1 class="auth-title" data-i18n="auth.reset.title">Nieuw wachtwoord</h1>
    <p class="auth-subtitle" data-i18n="auth.reset.subtitle">Kies een nieuw wachtwoord voor je account.</p>

    <div class="auth-error"   id="error-msg"></div>
    <div class="auth-success" id="success-msg"></div>

    <form class="auth-form" id="reset-form">
      <div class="form-group">
        <label for="password" data-i18n-html="auth.reset.password_label">Nieuw wachtwoord <span style="font-weight:400;color:#6b7280">(min. 8 tekens)</span></label>
        <input type="password" id="password" autocomplete="new-password" placeholder="••••••••" required minlength="8">
      </div>
      <div class="form-group">
        <label for="password2" data-i18n="auth.reset.password2_label">Herhaal wachtwoord</label>
        <input type="password" id="password2" autocomplete="new-password" placeholder="••••••••" required minlength="8">
      </div>
      <button type="submit" class="btn-primary" id="submit-btn" data-i18n="auth.reset.submit">Wachtwoord opslaan</button>
    </form>

    <div class="auth-links" id="login-link" style="display:none">
      <a href="/login.html" data-i18n="auth.reset.go_to_login">Ga naar inloggen →</a>
    </div>
  </div>
</div>
<script src="/lang/i18n.js"></script>
<script>
  I18n.onReady(() => {
    const c = document.getElementById('auth-lang-toggle');
    if (c) c.appendChild(I18n.createToggle());
  });

  const token = new URLSearchParams(location.search).get('token');
  if (!token) {
    const err = document.getElementById('error-msg');
    err.textContent = I18n.t('auth.reset.error_invalid_link', 'Ongeldige resetlink. Vraag een nieuwe aan via "Wachtwoord vergeten".');
    err.style.display = 'block';
    document.getElementById('reset-form').style.display = 'none';
  }

  document.getElementById('reset-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('submit-btn');
    const errEl  = document.getElementById('error-msg');
    const succEl = document.getElementById('success-msg');
    errEl.style.display = succEl.style.display = 'none';

    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    if (password !== password2) {
      errEl.textContent = I18n.t('auth.reset.error_mismatch', 'Wachtwoorden komen niet overeen');
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = I18n.t('auth.reset.saving', 'Opslaan...');

    try {
      const res  = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();

      if (res.ok) {
        succEl.textContent = data.message || I18n.t('auth.reset.success', 'Wachtwoord gewijzigd!');
        succEl.style.display = 'block';
        document.getElementById('login-link').style.display = 'block';
        document.getElementById('reset-form').style.display = 'none';
      } else {
        errEl.textContent = data.error || I18n.t('auth.reset.error_failed', 'Reset mislukt');
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = I18n.t('auth.reset.submit', 'Wachtwoord opslaan');
      }
    } catch {
      errEl.textContent = I18n.t('auth.reset.error_network', 'Netwerkfout. Probeer het opnieuw.');
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = I18n.t('auth.reset.submit', 'Wachtwoord opslaan');
    }
  });
</script>
</body>
</html>
