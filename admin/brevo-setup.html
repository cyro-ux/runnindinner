<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Brevo key rotation – Running Dinner Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 60px auto; padding: 20px; }
    .box { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; }
    input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 7px; font-family: monospace; font-size: .85rem; margin: 8px 0; }
    button { background: #E85D3A; color: #fff; border: none; padding: 10px 20px; border-radius: 7px; font-weight: 600; cursor: pointer; }
    .result { margin-top: 14px; padding: 12px; border-radius: 7px; display: none; }
    .ok  { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .err { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  </style>
</head>
<body>
<h1>🔑 Brevo API-key rotatie</h1>
<div class="box">
  <p>Plak hier de nieuwe <code>xkeysib-...</code> API key, of laat hem automatisch invullen vanuit de URL-fragment.</p>
  <label>Nieuwe API key</label>
  <input type="text" id="apikey" placeholder="xkeysib-...">
  <button id="go">Opslaan + valideren</button>
  <div id="result" class="result"></div>
</div>

<script>
(() => {
  const hash = location.hash.replace(/^#/, '');
  // Accept both API keys (xkeysib-...) and SMTP keys (xsmtpsib-...)
  if (hash.startsWith('xkeysib-') || hash.startsWith('xsmtpsib-')) {
    document.getElementById('apikey').value = hash;
  }
  // Try sessionStorage as fallback (survives login redirect)
  const stored = sessionStorage.getItem('brevoKey');
  if (!hash && stored) document.getElementById('apikey').value = stored;
})();

document.getElementById('go').addEventListener('click', async () => {
  const btn = document.getElementById('go');
  const result = document.getElementById('result');
  const key = document.getElementById('apikey').value.trim();
  btn.disabled = true;
  result.style.display = 'none';

  // Route to correct endpoint based on prefix
  const endpoint = key.startsWith('xsmtpsib-')
    ? '/api/admin/brevo/set-smtp-key'
    : '/api/admin/brevo/set-key';
  const body = key.startsWith('xsmtpsib-')
    ? { smtpKey: key }
    : { apiKey: key };

  try {
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    result.textContent = d.ok ? '✓ ' + d.message : '✗ ' + (d.error || JSON.stringify(d));
    result.className = 'result ' + (d.ok ? 'ok' : 'err');
    result.style.display = 'block';
    if (d.ok) {
      sessionStorage.removeItem('brevoKey');
      setTimeout(() => { location.hash = ''; }, 2000);
    }
  } catch (err) {
    result.textContent = '✗ ' + err.message;
    result.className = 'result err';
    result.style.display = 'block';
  }
  btn.disabled = false;
});
</script>
</body>
</html>
