name: Deploy Running Dinner Planner

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy-acceptance:
    if: github.ref == 'refs/heads/develop'
    name: Deploy to Acceptance
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to acc.runningdiner.nl
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # PM2 needs HOME to locate its daemon state in ~/.pm2.
            # Non-login shells from appleboy/ssh-action don't set HOME,
            # which silently breaks `pm2 reload` with "Process not found".
            # appleboy/ssh-action uses a non-login shell where HOME is unset.
            # PM2 keeps its daemon state in ~/.pm2, so hard-code the deploy
            # user's home to avoid falling back to /etc/.pm2 (no write perms).
            export HOME=/home/deploy
            cd /var/www/running-dinner/acc
            git pull origin develop
            npm install --production
            # Backup database before reload
            mkdir -p /backup
            sqlite3 data/app.db ".backup '/backup/acc-pre-deploy-$(date +%Y%m%d-%H%M%S).db'" 2>/dev/null || true
            pm2 reload running-dinner-acc --update-env
            # Health check — use a new-code marker endpoint if present
            sleep 2
            curl -sf http://localhost:3001/api/mollie/price > /dev/null && echo "Health check OK" || { echo "Health check FAILED"; exit 1; }

  deploy-production:
    if: github.ref == 'refs/heads/main'
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to runningdiner.nl
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # PM2 needs HOME to locate its daemon state in ~/.pm2.
            # Non-login shells from appleboy/ssh-action don't set HOME,
            # which silently breaks `pm2 reload` with "Process not found".
            # appleboy/ssh-action uses a non-login shell where HOME is unset.
            # PM2 keeps its daemon state in ~/.pm2, so hard-code the deploy
            # user's home to avoid falling back to /etc/.pm2 (no write perms).
            export HOME=/home/deploy
            cd /var/www/running-dinner/prod
            # Backup database before deploy
            mkdir -p /backup
            sqlite3 data/app.db ".backup '/backup/prod-pre-deploy-$(date +%Y%m%d-%H%M%S).db'"
            git pull origin main
            npm install --production
            pm2 reload running-dinner-prod --update-env
            # Health check
            sleep 2
            curl -sf http://localhost:3000/api/mollie/price > /dev/null && echo "Health check OK" || { echo "Health check FAILED"; exit 1; }
